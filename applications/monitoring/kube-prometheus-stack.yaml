apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      releaseName: kube-prometheus-stack
      values: |
        prometheusOperator:
          image:
            registry: azureaksd9c76970acr.azurecr.io/quay.io
            repository: prometheus-operator/prometheus-operator
          prometheusConfigReloader:
            image:
              registry: azureaksd9c76970acr.azurecr.io/quay.io
              repository: prometheus-operator/prometheus-config-reloader
        prometheus:
          prometheusSpec:
            image:
              registry: azureaksd9c76970acr.azurecr.io/quay.io
              repository: prometheus/prometheus
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            retention: 24h
            storageSpec: {}
        grafana:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          service:
            type: ClusterIP
        alertmanager:
          alertmanagerSpec:
            image:
              registry: azureaksd9c76970acr.azurecr.io/quay.io
              repository: prometheus/alertmanager
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
        kube-state-metrics:
          image:
            registry: azureaksd9c76970acr.azurecr.io/registry.k8s.io
            repository: kube-state-metrics/kube-state-metrics
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        prometheus-node-exporter:
          image:
            registry: azureaksd9c76970acr.azurecr.io/quay.io
            repository: prometheus/node-exporter
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
