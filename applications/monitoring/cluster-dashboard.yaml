apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cluster-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] }, "unit": "percent" }
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "title": "Cluster CPU Usage",
          "type": "gauge",
          "targets": [{ "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] }, "unit": "percent" }
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "title": "Cluster Memory Usage",
          "type": "gauge",
          "targets": [{ "expr": "100 * (1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }] } }
          },
          "gridPos": { "h": 6, "w": 3, "x": 12, "y": 0 },
          "title": "Nodes",
          "type": "stat",
          "targets": [{ "expr": "count(kube_node_info)", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }] } }
          },
          "gridPos": { "h": 6, "w": 3, "x": 15, "y": 0 },
          "title": "Running Pods",
          "type": "stat",
          "targets": [{ "expr": "sum(kube_pod_status_phase{phase=\"Running\"})", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } }
          },
          "gridPos": { "h": 6, "w": 3, "x": 18, "y": 0 },
          "title": "Failed Pods",
          "type": "stat",
          "targets": [{ "expr": "sum(kube_pod_status_phase{phase=\"Failed\"}) or vector(0)", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } }
          },
          "gridPos": { "h": 6, "w": 3, "x": 21, "y": 0 },
          "title": "Pending Pods",
          "type": "stat",
          "targets": [{ "expr": "sum(kube_pod_status_phase{phase=\"Pending\"}) or vector(0)", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percent", "custom": { "fillOpacity": 20, "lineWidth": 2 } }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "title": "CPU Usage by Node",
          "type": "timeseries",
          "targets": [{ "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)", "legendFormat": "{{ instance }}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percent", "custom": { "fillOpacity": 20, "lineWidth": 2 } }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "title": "Memory Usage by Node",
          "type": "timeseries",
          "targets": [{ "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))", "legendFormat": "{{ instance }}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "Bps", "custom": { "fillOpacity": 20, "lineWidth": 2 } }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "title": "Network Received by Node",
          "type": "timeseries",
          "targets": [{ "expr": "sum by(instance) (rate(node_network_receive_bytes_total{device!~\"lo|veth.*|docker.*|flannel.*|cali.*|cbr.*\"}[5m]))", "legendFormat": "{{ instance }}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "Bps", "custom": { "fillOpacity": 20, "lineWidth": 2 } }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "title": "Network Transmitted by Node",
          "type": "timeseries",
          "targets": [{ "expr": "sum by(instance) (rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|docker.*|flannel.*|cali.*|cbr.*\"}[5m]))", "legendFormat": "{{ instance }}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "fillOpacity": 20, "lineWidth": 2 } }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 22 },
          "title": "Pod Memory Usage (Top 10)",
          "type": "timeseries",
          "targets": [{ "expr": "topk(10, sum by(pod, namespace) (container_memory_working_set_bytes{container!=\"\", container!=\"POD\"}))", "legendFormat": "{{ namespace }}/{{ pod }}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "fillOpacity": 20, "lineWidth": 2 } }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 22 },
          "title": "Pod CPU Usage (Top 10)",
          "type": "timeseries",
          "targets": [{ "expr": "topk(10, sum by(pod, namespace) (rate(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\"}[5m])))", "legendFormat": "{{ namespace }}/{{ pod }}" }]
        }
      ],
      "schemaVersion": 39,
      "tags": ["kubernetes", "cluster"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Cluster Overview",
      "uid": "cluster-overview"
    }
